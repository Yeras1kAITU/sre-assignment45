apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: project-order-service
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: microservices
        - name: DB_USER
          value: admin
        - name: DB_PASSWORD
          value: admin123
        ports:
        - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices
spec:
  selector:
    app: order-service
  ports:
  - port: 8002
    targetPort: 8002
