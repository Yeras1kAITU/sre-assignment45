[server]
root_url = https://grafana.yeras1k.online
serve_from_sub_path = true

[security]
admin_user = admin
admin_password = admin

[paths]
data = /var/lib/grafana
logs = /var/log/grafana

[database]
type = sqlite3
path = /var/lib/grafana/grafana.db

[log]
mode = console

[auth.anonymous]
enabled = true
org_role = Viewer
