---
- name: Deploy Microservices Application with Docker Compose
  hosts: localhost
  connection: local
  gather_facts: yes

  tasks:
    - name: Ensure Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: yes

    - name: Display Docker version
      debug:
        msg: "Docker version: {{ docker_check.stdout }}"

    - name: Ensure docker-compose is installed
      command: docker compose version
      register: compose_check
      ignore_errors: yes

    - name: Display Docker Compose version
      debug:
        msg: "Docker Compose version: {{ compose_check.stdout }}"

    - name: Check if services are already running
      command: docker compose ps -q
      args:
        chdir: "{{ docker_compose_dir }}"
      register: running_containers
      ignore_errors: yes

    - name: Stop existing containers if any
      command: docker compose down
      args:
        chdir: "{{ docker_compose_dir }}"
      when: running_containers.stdout != ""
      ignore_errors: yes

    - name: Build and start all services
      command: docker compose up -d --build
      args:
        chdir: "{{ docker_compose_dir }}"
      register: compose_up

    - name: Wait for services to be healthy
      pause:
        seconds: 30

    - name: Check service status
      command: docker compose ps
      args:
        chdir: "{{ docker_compose_dir }}"
      register: compose_ps

    - name: Display all running services
      debug:
        var: compose_ps.stdout_lines

    - name: Verify auth-service is healthy
      uri:
        url: http://localhost:8000/health
        status_code: 200
      register: auth_health
      retries: 10
      delay: 5

    - name: Verify product-service is healthy
      uri:
        url: http://localhost:8001/health
        status_code: 200
      register: product_health
      retries: 10
      delay: 5

    - name: Verify order-service is healthy
      uri:
        url: http://localhost:8002/health
        status_code: 200
      register: order_health
      retries: 10
      delay: 5

    - name: Display verification results
      debug:
        msg:
          - "Auth Service: {{ auth_health.json.status }}"
          - "Product Service: {{ product_health.json.status }}"
          - "Order Service: {{ order_health.json.status }}"
      when: auth_health is defined and product_health is defined and order_health is defined
