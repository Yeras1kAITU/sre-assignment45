name: CI/CD Pipeline for Google Cloud Run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: sre-final-project-496514
  REGION: us-central1

jobs:
  # ============================================
  # JOB 1: VALIDATE
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Service Configurations
        run: |
          for service in auth product order payment user notification; do
            if [ ! -f "services/${service}-service/main.py" ]; then
              echo "Missing service: ${service}-service"
              exit 1
            fi
          done
          echo "All 6 services validated"

      - name: Validate Dockerfiles
        run: |
          for service in auth product order payment user notification; do
            if [ ! -f "services/${service}-service/Dockerfile" ]; then
              echo "Missing Dockerfile for: ${service}-service"
              exit 1
            fi
          done
          echo "All Dockerfiles validated"

      - name: Validate Kubernetes Manifests
        run: |
          for file in kubernetes/*.yaml; do
            echo "Checking $file"
          done
          echo "Kubernetes manifests found"

  # ============================================
  # JOB 2: BUILD DOCKER IMAGES (Test only)
  # ============================================
  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, product, order, payment, user, notification]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image for ${{ matrix.service }}-service
        run: |
          docker build -t ${{ matrix.service }}-service:test ./services/${{ matrix.service }}-service
          echo "Built ${{ matrix.service }}-service successfully"

  # ============================================
  # JOB 3: TEST
  # ============================================
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Integration Tests
        run: |
          python3 tests/integration_test.py

  # ============================================
  # JOB 4: DEPLOY TO GOOGLE CLOUD RUN
  # ============================================
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push auth-service
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/auth-service:latest ./services/auth-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/auth-service:latest

      - name: Build and Push product-service
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/product-service:latest ./services/product-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/product-service:latest

      - name: Build and Push order-service
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/order-service:latest ./services/order-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/order-service:latest

      - name: Build and Push payment-service
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/payment-service:latest ./services/payment-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/payment-service:latest

      - name: Build and Push user-service
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/user-service:latest ./services/user-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/user-service:latest

      - name: Build and Push notification-service
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/notification-service:latest ./services/notification-service
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/notification-service:latest

  # ============================================
  # JOB 5: HEALTH CHECK
  # ============================================
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify Services
        run: |
          echo "CI/CD Pipeline Complete"
          echo "Services deployed to https://yeras1k.online"
