name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # JOB 1: VALIDATE
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Terraform
        run: |
          cd terraform
          terraform init
          terraform validate
          terraform fmt -check

      - name: Validate Kubernetes Manifests
        uses: azure/setup-kubectl@v3
      - run: kubectl apply -f kubernetes/ --dry-run=client

  # ============================================
  # JOB 2: BUILD & PUSH DOCKER IMAGES
  # ============================================
  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, product, order, payment, user, chat]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}-service:latest ./services/${{ matrix.service }}-service
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}-service:latest

  # ============================================
  # JOB 3: TEST
  # ============================================
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Tests
        run: |
          pip install pytest fastapi httpx requests
          cd tests
          pytest --tb=short -v

  # ============================================
  # JOB 4: DEPLOY TO KUBERNETES
  # ============================================
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/
          kubectl rollout status deployment/nginx -n microservices --timeout=120s

  # ============================================
  # JOB 5: HEALTH CHECK
  # ============================================
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify Services
        run: |
          curl -f http://${{ secrets.DEPLOY_URL }}/api/auth/health || exit 1
          curl -f http://${{ secrets.DEPLOY_URL }}/api/products/health || exit 1
          curl -f http://${{ secrets.DEPLOY_URL }}/api/orders/health || exit 1
          curl -f http://${{ secrets.DEPLOY_URL }}/api/payment/health || exit 1
          echo "✅ ALL SERVICES HEALTHY"