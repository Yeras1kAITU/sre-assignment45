name: GCP CloudRun CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: sre-final-project-496514
  REGION: us-central1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate service configurations
        run: |
          for service in auth product order payment user notification; do
            if [ ! -f "services/${service}-service/main.py" ]; then
              echo "Missing service: ${service}-service"
              exit 1
            fi
          done
          echo "All services validated"

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, product, order, payment, user, notification]
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push ${{ matrix.service }}-service
        run: |
          SERVICE_NAME="${{ matrix.service }}-service"
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/${SERVICE_NAME}:${{ github.sha }}"
          docker build -t $IMAGE_URI ./services/${SERVICE_NAME}
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_OUTPUT

  test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install requests

      - name: Run integration tests
        run: |
          python3 tests/integration_test.py

  deploy-cloud-run:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy auth-service
        run: |
          gcloud run deploy auth-service \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/auth-service:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --port 8000 \
            --set-env-vars "DB_HOST=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:postgres-db,DB_NAME=microservices,DB_USER=admin,DB_PASSWORD=${{ secrets.DB_PASSWORD }},JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:postgres-db

      - name: Deploy product-service
        run: |
          gcloud run deploy product-service \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/product-service:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --port 8001 \
            --set-env-vars "DB_HOST=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:postgres-db,DB_NAME=microservices,DB_USER=admin,DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:postgres-db

      - name: Deploy order-service
        run: |
          gcloud run deploy order-service \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/microservices-repo/order-service:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 2 \
            --max-instances 20 \
            --port 8002 \
            --set-env-vars "DB_HOST=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:postgres-db,DB_NAME=microservices,DB_USER=admin,DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:postgres-db

  health-check:
    needs: deploy-cloud-run
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verify services
        run: |
          echo "All services deployed successfully"
          echo "✅ CI/CD Pipeline Complete"