<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Platform</title>
    <style>
        body { font-family: Arial, sans-serif; background: #667eea; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        h1 { color: #667eea; margin: 0 0 15px 0; }
        nav { display: flex; gap: 10px; }
        nav button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #e0e0e0; font-size: 14px; }
        nav button:hover, nav button.active { background: #667eea; color: white; }
        section { background: white; padding: 25px; border-radius: 10px; display: none; }
        section.active { display: block; }
        h2 { color: #667eea; margin-top: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { background: #f5f5f5; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .card h3 { margin: 0 0 8px 0; color: #333; }
        .card p { margin: 4px 0; color: #555; }
        input { padding: 8px 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 14px; margin: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #ccc; color: #333; }
        .green { color: green; font-weight: bold; }
        .red { color: red; font-weight: bold; }
        .chat-box { border: 2px solid #ddd; border-radius: 8px; height: 350px; display: flex; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; }
        #chat-messages p { margin: 5px 0; padding: 8px; background: white; border-radius: 5px; }
        .chat-input-area { display: flex; padding: 10px; border-top: 2px solid #ddd; gap: 5px; }
        .chat-input-area input:first-child { width: 100px; }
        .chat-input-area input:nth-child(2) { flex: 1; }
        .order-row { display: flex; gap: 10px; margin: 8px 0; align-items: center; }
        .order-row input { flex: 1; }
        .order-row .prod-id { flex: 1; }
        .order-row .prod-qty { flex: 0.5; }
        .order-row .prod-price { flex: 1; }
        .order-header { display: flex; gap: 10px; font-weight: bold; color: #667eea; padding: 5px; font-size: 13px; }
        .order-header span:first-child { flex: 1; }
        .order-header span:nth-child(2) { flex: 0.5; }
        .order-header span:nth-child(3) { flex: 1; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Microservices E-Commerce Platform</h1>
        <nav>
            <button class="active" onclick="showTab('products')">Products</button>
            <button onclick="showTab('orders')">Orders</button>
            <button onclick="showTab('chat')">Live Chat</button>
            <button onclick="showTab('status')">System Status</button>
        </nav>
    </header>

    <section id="tab-products" class="active">
        <h2>Products Catalog</h2>
        <div id="products-list" class="grid">Loading...</div>
    </section>

    <section id="tab-orders">
        <h2>Create Order</h2>
        <div class="card" style="margin-bottom:15px;">
            <p><strong>User ID:</strong> <input type="text" id="order-user" value="john_doe" style="width:200px;"></p>
            <div class="order-header">
                <span>Product ID</span>
                <span>Qty</span>
                <span>Price ($)</span>
            </div>
            <div id="order-items">
                <div class="order-row">
                    <input type="number" class="prod-id" placeholder="Product ID" value="1" onchange="lookupPrice(this)">
                    <input type="number" class="prod-qty" placeholder="Qty" value="1" min="1">
                    <input type="number" class="prod-price" placeholder="Price" value="0" step="0.01" min="0">
                </div>
            </div>
            <button class="btn btn-secondary" onclick="addOrderRow()">+ Add Item</button>
            <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
        </div>
        <h2>Order History</h2>
        <div id="orders-list">Loading...</div>
    </section>

    <section id="tab-chat">
        <h2>Live Chat</h2>
        <div class="chat-box">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-name" value="User" placeholder="Name">
                <input type="text" id="chat-msg" placeholder="Type message..." onkeypress="if(event.key==='Enter')sendChat()">
                <button class="btn btn-primary" onclick="sendChat()">Send</button>
            </div>
        </div>
    </section>

    <section id="tab-status">
        <h2>System Health</h2>
        <div id="status-list" class="grid">Loading...</div>
        <p style="margin-top:20px;">
            <a href="http://localhost:9090" target="_blank">Prometheus</a> |
            <a href="http://localhost:3000" target="_blank">Grafana</a>
        </p>
    </section>
</div>

<script>
    var productPrices = {};

    function showTab(name) {
        document.querySelectorAll('section').forEach(function(s) { s.classList.remove('active'); });
        document.getElementById('tab-' + name).classList.add('active');
        document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
        event.target.classList.add('active');
        if (name === 'products') loadProducts();
        if (name === 'orders') loadOrders();
        if (name === 'chat' && !window.wsConn) startChat();
        if (name === 'status') loadStatus();
    }

    function loadProducts() {
        var div = document.getElementById('products-list');
        div.innerHTML = 'Loading...';
        fetch('/api/products/products')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.products) { d.products.forEach(function(p) { productPrices[p.id] = p.price; }); }
                div.innerHTML = (d.products && d.products.length) ? d.products.map(function(p) {
                    return '<div class="card"><h3>' + p.name + '</h3><p>' + (p.description||'') + '</p><p><strong>$' + parseFloat(p.price).toFixed(2) + '</strong></p><p>Stock: ' + p.stock + '</p><p>Category: ' + p.category + '</p></div>';
                }).join('') : '<p class="red">No products</p>';
            })
            .catch(function(e) { div.innerHTML = '<p class="red">Error: ' + e.message + '</p>'; });
    }

    function lookupPrice(input) {
        var productId = parseInt(input.value);
        var priceInput = input.parentElement.querySelector('.prod-price');
        if (productPrices[productId]) { priceInput.value = productPrices[productId]; priceInput.style.borderColor = '#48bb78'; }
        else { priceInput.value = ''; priceInput.style.borderColor = '#ddd'; }
    }

    function addOrderRow() {
        var div = document.createElement('div');
        div.className = 'order-row';
        div.innerHTML = '<input type="number" class="prod-id" placeholder="Product ID" onchange="lookupPrice(this)"><input type="number" class="prod-qty" placeholder="Qty" value="1" min="1"><input type="number" class="prod-price" placeholder="Price" value="0" step="0.01" min="0">';
        document.getElementById('order-items').appendChild(div);
    }

    function submitOrder() {
        var userId = document.getElementById('order-user').value || 'john_doe';
        var items = [], totalAmount = 0;
        document.querySelectorAll('.order-row').forEach(function(row) {
            var id = row.querySelector('.prod-id').value, qty = row.querySelector('.prod-qty').value, price = row.querySelector('.prod-price').value;
            if (id && qty && price) { items.push({product_id: parseInt(id), quantity: parseInt(qty), price: parseFloat(price)}); totalAmount += parseFloat(price) * parseInt(qty); }
        });
        if (!items.length) return alert('Add at least one item');
        fetch('/api/orders/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: userId, items: items, total_amount: parseFloat(totalAmount.toFixed(2))}) })
            .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d}; }); })
            .then(function(result) { if (result.ok) { alert('Order created! ID: ' + result.data.order_id + '\nTotal: $' + totalAmount.toFixed(2)); loadOrders(); } else { alert('Error: ' + JSON.stringify(result.data)); } })
            .catch(function(e) { alert('Failed: ' + e.message); });
    }

    function loadOrders() {
        var div = document.getElementById('orders-list');
        fetch('/api/orders/orders')
            .then(function(r) { return r.json(); })
            .then(function(d) { div.innerHTML = (d.orders && d.orders.length) ? d.orders.map(function(o) { return '<div class="card"><p><strong>Order #' + o.id + '</strong></p><p>User: ' + o.user_id + '</p><p>Status: ' + o.status + '</p><p>Total: $' + parseFloat(o.total_amount).toFixed(2) + '</p></div>'; }).join('') : '<p>No orders</p>'; })
            .catch(function(e) { div.innerHTML = '<p class="red">Error: ' + e.message + '</p>'; });
    }

    function startChat() {
        var name = document.getElementById('chat-name').value || 'User';
        window.wsConn = new WebSocket('ws://localhost/ws/' + name);
        window.wsConn.onopen = function() { addChatMsg('Connected as ' + name, true); };
        window.wsConn.onmessage = function(e) { var d = JSON.parse(e.data); addChatMsg(d.type === 'system' ? d.message : (d.username ? d.username + ': ' + d.message : d.message), d.type === 'system'); };
        window.wsConn.onclose = function() { addChatMsg('Disconnected', true); window.wsConn = null; };
    }

    function addChatMsg(msg, isSystem) {
        var p = document.createElement('p'); if (isSystem) { p.style.color = '#667eea'; p.style.fontStyle = 'italic'; }
        p.textContent = msg; var div = document.getElementById('chat-messages'); div.appendChild(p); div.scrollTop = div.scrollHeight;
    }

    function sendChat() { var msg = document.getElementById('chat-msg').value.trim(); if (msg && window.wsConn) { window.wsConn.send(msg); document.getElementById('chat-msg').value = ''; } }

    function loadStatus() {
        var div = document.getElementById('status-list');
        var services = [{id:'auth',name:'Auth Service'},{id:'products',name:'Product Service'},{id:'orders',name:'Order Service'},{id:'users',name:'User Service'},{id:'chat',name:'Chat Service'}];
        Promise.all(services.map(function(s) {
            return fetch('/api/' + s.id + '/health').then(function(r) { return r.json(); }).then(function(d) { return '<div class="card"><h3>' + s.name + '</h3><p>Status: <span class="' + (d.status==='healthy'?'green':'red') + '">' + d.status.toUpperCase() + '</span></p><p>DB: ' + (d.database||'N/A') + '</p></div>'; }).catch(function() { return '<div class="card"><h3>' + s.name + '</h3><p class="red">DOWN</p></div>'; });
        })).then(function(results) { div.innerHTML = results.join(''); });
    }

    loadProducts();
</script>
</body>
</html>
