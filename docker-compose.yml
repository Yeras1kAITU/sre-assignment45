networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/html:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: microservices
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d microservices"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    environment:
      DB_HOST: postgres
      DB_NAME: microservices
      DB_USER: admin
      DB_PASSWORD: admin123
      JWT_SECRET: your-super-secret-key
    ports:
      - "8000:8000"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build: ./services/product-service
    container_name: product-service
    environment:
      DB_HOST: postgres
      DB_NAME: microservices
      DB_USER: admin
      DB_PASSWORD: admin123
    ports:
      - "8001:8001"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  order-service:
    build: ./services/order-service
    container_name: order-service
    environment:
      DB_HOST: postgres-invalid
      DB_NAME: microservices
      DB_USER: admin
      DB_PASSWORD: admin123
    ports:
      - "8002:8002"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    container_name: user-service
    environment:
      DB_HOST: postgres
      DB_NAME: microservices
      DB_USER: admin
      DB_PASSWORD: admin123
    ports:
      - "8003:8003"
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  chat-service:
    build: ./services/chat-service
    container_name: chat-service
    ports:
      - "8004:8004"
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/dashboards/provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./monitoring/grafana/dashboards/microservices-dashboard.json:/etc/grafana/provisioning/dashboards/microservices-dashboard.json:ro
      - ./monitoring/grafana/dashboards/incident-dashboard.json:/etc/grafana/provisioning/dashboards/incident-dashboard.json:ro
    ports:
      - "3000:3000"
    networks:
      - app-network