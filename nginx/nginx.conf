events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://auth-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/auth {
            rewrite ^/api/auth$ / break;
            proxy_pass http://auth-service:8000;
            proxy_set_header Host $host;
        }

        location /api/products/ {
            rewrite ^/api/products/(.*)$ /$1 break;
            proxy_pass http://product-service:8001;
            proxy_set_header Host $host;
        }
        
        location /api/products {
            rewrite ^/api/products$ / break;
            proxy_pass http://product-service:8001;
            proxy_set_header Host $host;
        }

        location /api/orders/ {
            rewrite ^/api/orders/(.*)$ /$1 break;
            proxy_pass http://order-service:8002;
            proxy_set_header Host $host;
        }
        
        location /api/orders {
            rewrite ^/api/orders$ / break;
            proxy_pass http://order-service:8002;
            proxy_set_header Host $host;
        }

        location /api/users/ {
            rewrite ^/api/users/(.*)$ /$1 break;
            proxy_pass http://user-service:8003;
            proxy_set_header Host $host;
        }
        
        location /api/users {
            rewrite ^/api/users$ / break;
            proxy_pass http://user-service:8003;
            proxy_set_header Host $host;
        }

        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass http://chat-service:8004;
            proxy_set_header Host $host;
        }
        
        location /api/chat {
            rewrite ^/api/chat$ / break;
            proxy_pass http://chat-service:8004;
            proxy_set_header Host $host;
        }

        location /ws/ {
            proxy_pass http://chat-service:8004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}