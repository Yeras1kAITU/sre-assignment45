events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name your-domain.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name your-domain.com;

        # SSL certificates
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API routes
        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://auth-service:8000;
            proxy_set_header Host $host;
        }

        location /api/products/ {
            rewrite ^/api/products/(.*)$ /$1 break;
            proxy_pass http://product-service:8001;
            proxy_set_header Host $host;
        }

        location /api/orders/ {
            rewrite ^/api/orders/(.*)$ /$1 break;
            proxy_pass http://order-service:8002;
            proxy_set_header Host $host;
        }

        location /api/users/ {
            rewrite ^/api/users/(.*)$ /$1 break;
            proxy_pass http://user-service:8003;
            proxy_set_header Host $host;
        }

        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass http://chat-service:8004;
            proxy_set_header Host $host;
        }

        location /api/payment/ {
            rewrite ^/api/payment/(.*)$ /$1 break;
            proxy_pass http://payment-service:8005;
            proxy_set_header Host $host;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://chat-service:8004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}