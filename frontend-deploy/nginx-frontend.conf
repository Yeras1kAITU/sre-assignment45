server {
    listen 8080;
    server_name _;

    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/auth/ {
        proxy_pass https://auth-service-39785074712.us-central1.run.app/;
        proxy_set_header Host auth-service-39785074712.us-central1.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }

    location /api/products/ {
        proxy_pass https://product-service-39785074712.us-central1.run.app/;
        proxy_set_header Host product-service-39785074712.us-central1.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }

    location /api/orders/ {
        proxy_pass https://order-service-39785074712.us-central1.run.app/;
        proxy_set_header Host order-service-39785074712.us-central1.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }

    location /api/payment/ {
        proxy_pass https://payment-service-39785074712.us-central1.run.app/;
        proxy_set_header Host payment-service-39785074712.us-central1.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }

    location /api/user/ {
        proxy_pass https://user-service-39785074712.us-central1.run.app/;
        proxy_set_header Host user-service-39785074712.us-central1.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }

    location /api/notification/ {
        proxy_pass https://notification-service-39785074712.us-central1.run.app/;
        proxy_set_header Host notification-service-39785074712.us-central1.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_verify off;
    }

    location /ws/ {
        proxy_pass https://notification-service-39785074712.us-central1.run.app/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host notification-service-39785074712.us-central1.run.app;
        proxy_ssl_verify off;
    }
}
