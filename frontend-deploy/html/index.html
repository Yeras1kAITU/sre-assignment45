<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #667eea; margin-bottom: 15px; }
        nav { display: flex; gap: 10px; flex-wrap: wrap; }
        nav button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #e0e0e0; font-size: 14px; transition: all 0.3s; }
        nav button:hover, nav button.active { background: #667eea; color: white; }
        section { background: white; padding: 30px; border-radius: 10px; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        section.active { display: block; }
        h2 { color: #667eea; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .card h3 { margin-bottom: 10px; color: #333; }
        .card p { margin: 8px 0; color: #666; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 2px solid #e0e0e0; border-radius: 5px; font-size: 14px; }
        input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #ccc; }
        .green { color: #48bb78; font-weight: bold; }
        .red { color: #f56565; font-weight: bold; }
        .order-row { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .order-row input { flex: 1; }
        .chat-box { border: 2px solid #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        #chat-messages { height: 400px; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        #chat-messages p { margin: 10px 0; padding: 10px; background: white; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .chat-input-area { display: flex; gap: 10px; padding: 15px; background: white; border-top: 2px solid #e0e0e0; }
        .chat-input-area input:first-child { width: 120px; }
        .chat-input-area input:nth-child(2) { flex: 1; }
        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-healthy { background: #48bb78; }
        .status-degraded { background: #ed8936; }
        .status-down { background: #f56565; }
        .loading { text-align: center; padding: 40px; color: #667eea; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .chat-input-area { flex-direction: column; } .chat-input-area input:first-child { width: 100%; } nav { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Microservices SRE Platform</h1>
        <nav>
            <button class="active" onclick="showSection('products')">Products</button>
            <button onclick="showSection('orders')">Orders</button>
            <button onclick="showSection('chat')">Live Chat</button>
            <button onclick="showSection('status')">System Status</button>
        </nav>
    </header>

    <main>
        <section id="products-section" class="active">
            <h2>Products Catalog</h2>
            <div id="products-list" class="grid"><div class="loading">Loading products...</div></div>
        </section>

        <section id="orders-section">
            <h2>Create Order</h2>
            <div class="card">
                <p><strong>User ID:</strong> <input type="text" id="user-id" value="john_doe" style="width:200px;"></p>
                <div id="order-items">
                    <div class="order-row">
                        <input type="number" class="product-id" placeholder="Product ID" value="1">
                        <input type="number" class="quantity" placeholder="Quantity" value="1" min="1">
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="addOrderItem()">+ Add Item</button>
                <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
            </div>
            <h2 style="margin-top: 30px;">Order History</h2>
            <div id="orders-list"><div class="loading">Loading orders...</div></div>
        </section>

        <section id="chat-section">
            <h2>Live Chat</h2>
            <div class="chat-box">
                <div id="chat-messages"><div class="loading">Connecting to chat...</div></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-username" placeholder="Username" value="Anonymous">
                    <input type="text" id="chat-message" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </section>

        <section id="status-section">
            <h2>System Health Dashboard</h2>
            <div id="services-status" class="grid"><div class="loading">Loading status...</div></div>
            <p style="margin-top: 20px; text-align: center;">
                <a href="https://grafana.yeras1k.online" target="_blank" style="color: #667eea;">📊 Grafana Dashboard</a> &nbsp;|&nbsp;
                <a href="https://prometheus.yeras1k.online" target="_blank" style="color: #667eea;">📈 Prometheus Metrics</a>
            </p>
        </section>
    </main>
</div>

<script>
    let ws = null;
    let productPrices = {};

    async function showSection(section) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(`${section}-section`).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        if (section === 'products') await loadProducts();
        if (section === 'orders') await loadOrders();
        if (section === 'chat') initChat();
        if (section === 'status') await loadSystemStatus();
    }

    async function loadProducts() {
        try {
            const response = await fetch('/api/products/products');
            const data = await response.json();
            const container = document.getElementById('products-list');

            if (data.products && data.products.length) {
                data.products.forEach(p => { productPrices[p.id] = p.price; });
                container.innerHTML = data.products.map(p => `
                    <div class="card">
                        <h3>${escapeHtml(p.name)}</h3>
                        <p>${escapeHtml(p.description || 'No description')}</p>
                        <p><strong>Price:</strong> $${parseFloat(p.price).toFixed(2)}</p>
                        <p><strong>Stock:</strong> ${p.stock} units</p>
                        <p><strong>Category:</strong> ${escapeHtml(p.category)}</p>
                        <p><small>Product ID: ${p.id}</small></p>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card"><p>No products available</p></div>';
            }
        } catch (error) {
            document.getElementById('products-list').innerHTML = `<div class="card"><p class="red">Error loading products: ${error.message}</p></div>`;
        }
    }

    function addOrderItem() {
        const container = document.getElementById('order-items');
        const div = document.createElement('div');
        div.className = 'order-row';
        div.innerHTML = `
            <input type="number" class="product-id" placeholder="Product ID" onchange="updateItemPrice(this)">
            <input type="number" class="quantity" placeholder="Quantity" min="1" value="1" onchange="updateOrderTotal()">
        `;
        container.appendChild(div);
    }

    function updateItemPrice(element) {
        const productId = parseInt(element.value);
        if (productPrices[productId]) {
            element.style.borderColor = '#48bb78';
        } else {
            element.style.borderColor = '#f56565';
        }
        updateOrderTotal();
    }

    function updateOrderTotal() {
        let total = 0;
        document.querySelectorAll('.order-row').forEach(row => {
            const productId = parseInt(row.querySelector('.product-id').value);
            const quantity = parseInt(row.querySelector('.quantity').value);
            if (productPrices[productId] && quantity) {
                total += productPrices[productId] * quantity;
            }
        });

        let totalDisplay = document.getElementById('order-total-display');
        if (!totalDisplay) {
            const totalDiv = document.createElement('div');
            totalDiv.id = 'order-total-display';
            totalDiv.style.marginTop = '15px';
            totalDiv.style.fontWeight = 'bold';
            totalDiv.style.fontSize = '16px';
            totalDiv.innerHTML = '<strong>Total Amount: $<span id="order-total">0.00</span></strong>';
            document.querySelector('#order-items').parentNode.appendChild(totalDiv);
            totalDisplay = document.getElementById('order-total-display');
        }
        document.getElementById('order-total').textContent = total.toFixed(2);
    }

    async function submitOrder() {
        const userId = document.getElementById('user-id').value;
        if (!userId) {
            alert('Please enter a User ID');
            return;
        }

        const items = [];
        let totalAmount = 0;

        document.querySelectorAll('.order-row').forEach(row => {
            const productId = parseInt(row.querySelector('.product-id').value);
            const quantity = parseInt(row.querySelector('.quantity').value);
            if (productId && quantity && productPrices[productId]) {
                const price = productPrices[productId];
                items.push({product_id: productId, quantity: quantity, price: price});
                totalAmount += price * quantity;
            }
        });

        if (items.length === 0) {
            alert('Please add at least one valid item');
            return;
        }

        try {
            const response = await fetch('/api/orders/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({user_id: userId, items: items, total_amount: totalAmount})
            });
            const data = await response.json();
            if (response.ok) {
                alert(`✅ Order created successfully!\nOrder ID: ${data.order_id}\nTotal Amount: $${totalAmount.toFixed(2)}`);
                await loadOrders();
            } else {
                alert(`❌ Failed to create order: ${data.detail || 'Unknown error'}`);
            }
        } catch (error) {
            alert(`❌ Failed to create order: ${error.message}`);
        }
    }

    async function loadOrders() {
        try {
            const response = await fetch('/api/orders/orders');
            const data = await response.json();
            const container = document.getElementById('orders-list');

            if (data.orders && data.orders.length) {
                container.innerHTML = data.orders.map(o => `
                    <div class="card">
                        <p><strong>Order #${o.id}</strong></p>
                        <p><strong>User:</strong> ${escapeHtml(o.user_id)}</p>
                        <p><strong>Status:</strong> <span class="${o.status === 'completed' ? 'green' : o.status === 'pending' ? 'green' : 'red'}">${o.status}</span></p>
                        <p><strong>Total:</strong> $${parseFloat(o.total_amount).toFixed(2)}</p>
                        <p><strong>Items:</strong> ${typeof o.items === 'string' ? JSON.parse(o.items).length : (o.items || []).length}</p>
                        <p><small>${new Date(o.created_at).toLocaleString()}</small></p>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card"><p>No orders found</p></div>';
            }
        } catch (error) {
            document.getElementById('orders-list').innerHTML = `<div class="card"><p class="red">Error loading orders: ${error.message}</p></div>`;
        }
    }

    function initChat() {
        if (ws && ws.readyState === WebSocket.OPEN) return;

        const username = document.getElementById('chat-username').value || 'Anonymous';
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';

        try {
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/${username}`);

            ws.onopen = () => {
                addSystemMessage('Connected to chat server');
                const msgDiv = document.getElementById('chat-messages');
                if (msgDiv) msgDiv.innerHTML = '';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'system') {
                        addSystemMessage(data.message);
                    } else if (data.type === 'message') {
                        addChatMessage(data.username, data.message, data.timestamp);
                    } else if (data.type === 'history' && data.messages) {
                        data.messages.forEach(msg => {
                            if (msg.type === 'system') addSystemMessage(msg.message);
                            else addChatMessage(msg.username, msg.message, msg.timestamp);
                        });
                    }
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = () => {
                addSystemMessage('Disconnected from chat server');
                ws = null;
            };

            ws.onerror = (error) => {
                addSystemMessage('Connection error - chat may be unavailable');
            };
        } catch (error) {
            addSystemMessage('Failed to connect to chat service');
        }
    }

    function addChatMessage(username, message, timestamp) {
        const container = document.getElementById('chat-messages');
        if (!container) return;
        const p = document.createElement('p');
        const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
        p.innerHTML = `<strong>${escapeHtml(username)}:</strong> ${escapeHtml(message)}<br><small style="color:#999;">${time}</small>`;
        container.appendChild(p);
        container.scrollTop = container.scrollHeight;
    }

    function addSystemMessage(message) {
        const container = document.getElementById('chat-messages');
        if (!container) return;
        const p = document.createElement('p');
        p.style.color = '#667eea';
        p.style.fontStyle = 'italic';
        p.textContent = `[System] ${message}`;
        container.appendChild(p);
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('chat-message');
        const message = input.value.trim();
        if (message && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(message);
            input.value = '';
        } else if (!ws || ws.readyState !== WebSocket.OPEN) {
            alert('Not connected to chat server. Please wait for connection.');
            initChat();
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadSystemStatus() {
        const services = [
            {name: 'auth', display: 'Authentication Service', statusPath: '/health'},
            {name: 'products', display: 'Product Service', statusPath: '/health'},
            {name: 'orders', display: 'Order Service', statusPath: '/health'},
            {name: 'payment', display: 'Payment Service', statusPath: '/health'},
            {name: 'user', display: 'User Service', statusPath: '/health'},
            {name: 'notification', display: 'Notification Service', statusPath: '/health'}
        ];

        const container = document.getElementById('services-status');
        if (!container) return;
        container.innerHTML = '<div class="loading">Loading system status...</div>';

        const results = await Promise.all(services.map(async service => {
            try {
                const response = await fetch(`/api/${service.name}${service.statusPath}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const isHealthy = data.status === 'healthy';
                const indicatorClass = isHealthy ? 'status-healthy' : 'status-degraded';
                const statusText = data.status || (data.database === 'connected' ? 'healthy' : 'degraded');
                const dbStatus = data.database || data.redis || 'N/A';
                const timestamp = data.timestamp ? new Date(data.timestamp).toLocaleString() : new Date().toLocaleString();

                return `
                    <div class="card">
                        <h3>
                            <span class="status-indicator ${indicatorClass}"></span>
                            ${service.display}
                        </h3>
                        <p><strong>Status:</strong> <span class="${isHealthy ? 'green' : 'red'}">${statusText}</span></p>
                        <p><strong>Database/Redis:</strong> ${dbStatus}</p>
                        <p><small>${timestamp}</small></p>
                    </div>
                `;
            } catch (error) {
                return `
                    <div class="card">
                        <h3>
                            <span class="status-indicator status-down"></span>
                            ${service.display}
                        </h3>
                        <p><strong>Status:</strong> <span class="red">DOWN</span></p>
                        <p><small>${error.message}</small></p>
                    </div>
                `;
            }
        }));

        container.innerHTML = results.join('');
    }

    // Initialize
    loadProducts();
    updateOrderTotal();

    // Auto-refresh status every 30 seconds
    setInterval(() => {
        const statusSection = document.getElementById('status-section');
        if (statusSection && statusSection.classList.contains('active')) {
            loadSystemStatus();
        }
    }, 30000);
</script>
</body>
</html>
